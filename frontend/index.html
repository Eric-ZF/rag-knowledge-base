<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>RAG 学术知识库 — Phase 0 验证</title>
  <style>
    /* ── 基础重置 ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ─── Elicit 克制专业风格色板 ─────────────────────── */
      --ink-900: #111827;
      --ink-800: #1f2937;
      --ink-700: #374151;
      --ink-600: #4b5563;
      --ink-500: #6b7280;
      --ink-400: #9ca3af;
      --ink-300: #d1d5db;
      --paper:   #ffffff;
      --paper-2: #f9fafb;
      --paper-3: #f3f4f6;
      --accent:  #2563eb;          /* 学术蓝 */
      --accent-hover: #1d4ed8;
      --accent-light: rgba(37,99,235,0.06);
      --accent-border: rgba(37,99,235,0.15);
      --success: #059669;
      --success-bg: rgba(5,150,105,0.07);
      --danger:  #dc2626;
      --danger-bg: rgba(220,38,38,0.07);
      --warning: #d97706;
      --warning-bg: rgba(217,119,6,0.07);
      --info:    #0284c7;
      --info-bg: rgba(2,132,199,0.07);
      --gradient-primary: #2563eb;
      --border:  #e5e7eb;
      --border-2: #d1d5db;
      --shadow:  0 1px 2px rgba(0,0,0,0.05);
      --shadow-hover: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
      --shadow-xl: 0 8px 32px rgba(0,0,0,0.12);
      --radius-xs: 3px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 10px;
    }

    /* ── Dark mode ─────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root {
        --ink-900: #f9fafb;
        --ink-800: #e5e7eb;
        --ink-700: #d1d5db;
        --ink-600: #9ca3af;
        --ink-500: #6b7280;
        --ink-400: #4b5563;
        --ink-300: #374151;
        --paper:   #111827;
        --paper-2: #1f2937;
        --paper-3: #1f2937;
        --accent:  #60a5fa;
        --accent-hover: #93c5fd;
        --accent-light: rgba(96,165,250,0.08);
        --accent-border: rgba(96,165,250,0.2);
        --success-bg: rgba(5,150,105,0.1);
        --danger-bg: rgba(220,38,38,0.1);
        --warning-bg: rgba(217,119,6,0.1);
        --info-bg: rgba(56,189,248,0.1);
        --gradient-primary: #60a5fa;
        --border:  #374151;
        --border-2: #4b5563;
        --shadow:  0 1px 2px rgba(0,0,0,0.3);
        --shadow-hover: 0 2px 8px rgba(0,0,0,0.35);
        --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
        --shadow-xl: 0 8px 32px rgba(0,0,0,0.5);
      }
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', 'PingFang SC', system-ui, sans-serif;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11', 'ss01';
      background: var(--paper);
      color: var(--ink-700);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Toast 通知 ─────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 68px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 320px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      animation: toastIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      pointer-events: auto;
    }
    .toast.success { background: #1a5c3a; color: #fff; }
    .toast.error   { background: var(--danger); color: #fff; }
    .toast.info    { background: var(--ink-700); color: #fff; }
    .toast.warning  { background: var(--warning); color: #fff; }
    .toast.fade-out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px) scale(0.95); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    /* ── Accessibility: reduce motion ─────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── 顶栏 ─────────────────────────────────────────────── */
    header {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; color: var(--ink-900); }
    header .badge {
      font-size: 11px; padding: 2px 8px;
      background: var(--accent); color: #fff;
      border-radius: 10px;
    }
    .header-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
    #user-email { font-size: 13px; color: var(--ink-500); }

    /* ── 主布局 ─────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 56px);
    }

    /* 移动端：单列堆叠 */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: calc(100vh - 56px);
      }
      .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 45vh;
        overflow-y: auto;
      }
      .panel-right {
        min-height: 55vh;
      }
      .quota-banner {
        margin: 12px 16px 0;
        font-size: 12px;
      }
      .chat-messages {
        padding: 12px 16px;
      }
      .chat-input-area {
        padding: 10px 16px 16px;
      }
      .msg {
        max-width: 92%;
      }
      header {
        padding: 0 16px;
      }
    }

    /* ── 左侧：上传 + 论文列表 ─────────────────────────────── */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 拖拽上传区 */
    .upload-zone {
      margin: 24px;
      padding: 36px 24px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(37, 99, 235, 0.04);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .upload-zone:active { transform: scale(0.99); }
    .upload-zone p { color: var(--ink-500); font-size: 14px; }
    .upload-zone .hint { font-size: 12px; margin-top: 4px; color: var(--ink-400); }

    /* 上传区 loading 态 */
    .upload-zone.uploading {
      pointer-events: none;
      border-color: var(--success);
      background: rgba(58, 107, 196, 0.04);
    }
    .upload-zone.uploading p { color: var(--success); }
    .upload-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 论文列表 */
    .paper-list { flex: 1; overflow-y: auto; padding: 0 24px 24px; }
    .paper-list h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-500);
      margin-bottom: 12px;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--ink-400);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
    .empty-state .empty-title { font-size: 14px; font-weight: 500; color: var(--ink-500); margin-bottom: 6px; }
    .empty-state .empty-desc { font-size: 12px; color: var(--ink-400); line-height: 1.5; }

    /* 论文卡片 */
    .paper-item {
      padding: 11px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-bottom: 6px;
      transition: box-shadow 0.15s, border-color 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--paper);
    }
    .paper-item:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--accent-border);
    }
    .paper-item .paper-body { flex: 1; min-width: 0; }
    .paper-item .title { font-size: 13.5px; font-weight: 600; color: var(--ink-900); line-height: 1.4; }
    .paper-item .meta { font-size: 12px; color: var(--ink-500); margin-top: 4px; }
    .paper-item .status {
      display: inline-block; font-size: 11px;
      padding: 1px 6px; border-radius: 4px; margin-top: 6px;
    }
    /* 卡片右侧操作按钮区 */
    .paper-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      align-items: stretch;
    }
    .paper-actions .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: var(--ink-600);
      white-space: nowrap;
      transition: all 0.15s;
    }
    .paper-actions .cite-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(37,99,235,0.06);
    }
    .paper-actions .delete-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(220,38,38,0.06);
    }

    .status.ready       { background: rgba(58,107,196,0.12); color: var(--success); }
    .status.processing  { background: rgba(37,99,235,0.12); color: var(--accent); }
    .status.error       { background: rgba(217,54,54,0.12); color: var(--danger); }

    /* 进度条 */
    .progress-bar-wrap {
      margin: 8px 0 0; background: #eee;
      border-radius: 6px; height: 5px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), #e05a3a);
      border-radius: 6px; transition: width 0.35s ease; width: 0%;
    }
    .progress-label { font-size: 12px; color: var(--ink-500); margin-top: 4px; }

    /* ── 右侧：RAG 问答 ─────────────────────────────────── */
    .panel-right {
      display: flex; flex-direction: column;
      overflow: hidden; background: #f5f4f2;
    }

    /* Quota Banner */
    .quota-banner {
      margin: 20px 24px 0;
      padding: 10px 16px;
      background: white; border-radius: var(--radius-md);
      border: 1px solid var(--border);
      font-size: 13px; display: flex; gap: 12px; align-items: center;
    }
    .quota-banner .plan { font-weight: 600; color: var(--accent); }
    .quota-banner .papers { color: var(--ink-500); margin-left: auto; }

    /* Chat 区域 */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 16px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .msg { max-width: 85%; display: flex; flex-direction: column; gap: 4px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg .bubble {
      padding: 11px 15px; border-radius: 14px;
      font-size: 14px; line-height: 1.65;
    }
    .msg.user .bubble {
      background: var(--accent); color: white;
      border-bottom-right-radius: 4px;
      transition: background 0.15s;
    }
    .msg.user .bubble:hover { background: var(--accent-hover); }
    .msg.assistant .bubble {
      background: white; color: var(--ink-700);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      padding: 12px 15px;
      font-size: 14px;
      line-height: 1.65;
    }
    /* Markdown 标题在气泡内 */
    .msg.assistant .bubble h1 { font-size: 17px; font-weight: 700; margin: 8px 0 4px; color: #1a1a2e; }
    .msg.assistant .bubble h2 { font-size: 15px; font-weight: 700; margin: 6px 0 3px; color: #1a1a2e; }
    .msg.assistant .bubble h3 { font-size: 13px; font-weight: 600; margin: 5px 0 2px; color: #2d2d44; }
    .msg.assistant .bubble li { margin-left: 16px; padding-left: 4px; }
    .msg.assistant .bubble strong { font-weight: 700; color: #1a1a2e; }
    .msg.assistant .bubble em { font-style: italic; color: #555; }
    .msg.assistant .bubble code { background: #f3f2f0; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .msg.assistant .bubble blockquote {
      border-left: 3px solid #2563EB;
      margin: 6px 0; padding: 4px 10px;
      background: #f0f4ff; border-radius: 0 4px 4px 0;
      color: #1a1a2e; font-size: 13.5px;
    }
    .msg.assistant .bubble del { text-decoration: line-through; color: #9b97a8; }
    .msg.assistant .bubble .katex-inline { padding: 0 2px; }
    .msg.assistant .bubble blockquote .katex-display { margin: 4px 0; }
    /* Markdown 表格 */
    .msg.assistant .bubble .md-table {
      border-collapse: collapse;
      width: auto;
      max-width: 100%;
      margin: 8px 0;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .msg.assistant .bubble .md-table th {
      background: #f0f4ff;
      padding: 6px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--ink-700);
      font-size: 12.5px;
    }
    .msg.assistant .bubble .md-table td {
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--ink-700);
    }
    .msg.assistant .bubble .md-table tr:last-child td { border-bottom: none; }
    .msg.assistant .bubble .md-table tr:nth-child(even) td { background: #faf9f7; }
    .msg.assistant .bubble strong { font-weight: 700; color: #1a1a2e; }
    .msg.assistant .bubble em { font-style: italic; color: #555; }
    /* 引用 */
    .msg.assistant .citations {
      padding-top: 10px; margin-top: 10px;
      border-top: 1px solid var(--border);
    }
    .msg.assistant .citations .cite-label {
      font-size: 11px; color: var(--ink-400);
      margin-bottom: 5px; font-weight: 600;
    }
    .msg.assistant .citations .cite {
      padding: 3px 10px; background: #f0eeeb;
      border-radius: 4px; display: inline-block;
      margin: 2px 6px 2px 0; font-size: 12px;
      color: var(--ink-600); font-weight: 500;
      border: 1px solid #e5e3df;
      transition: background 0.15s;
    }
    .msg.assistant .citations .cite:hover { background: #e8e6e3; }

    /* 质量警告 */
    .msg.assistant .quality-warn {
      margin-top: 10px; padding: 8px 12px;
      background: #fef3cd; border: 1px solid #ffc107;
      border-radius: 6px; font-size: 12px; color: #856404;
      line-height: 1.5;
    }

    /* 消息出现动画 */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .msg { animation: msgIn 0.22s ease both; }

    /* typing 动画 */
    .typing-dots {
      display: inline-flex; gap: 4px; align-items: center;
      padding: 14px 16px; background: white;
      border: 1px solid var(--border);
      border-radius: 14px; border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink-400); display: block;
      animation: typingBounce 1.1s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    /* 等待提示 */
    .wait-indicator {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0;
    }
    .wait-dots {
      display: inline-flex; gap: 3px; align-items: center;
    }
    .wait-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--ink-400); display: block;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .wait-dots span:nth-child(2) { animation-delay: 0.2s; }
    .wait-dots span:nth-child(3) { animation-delay: 0.4s; }
    .wait-text {
      color: var(--ink-400); font-size: 13px;
      letter-spacing: 0.01em;
    }

    /* Chat 输入 */
    .chat-input-area {
      padding: 14px 24px 20px;
      background: #f5f4f2;
    }
    .chat-mode-row {
      display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .mode-btn {
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      color: var(--ink-500); font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .chat-input-row {
      display: flex; gap: 8px;
      background: white; border: 1.5px solid var(--border);
      border-radius: 12px; padding: 8px 12px;
      align-items: flex-end;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .chat-input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .chat-input-row textarea {
      flex: 1; border: none; outline: none;
      font-size: 14px; font-family: inherit;
      resize: none; min-height: 24px; max-height: 120px;
      line-height: 1.5; background: transparent;
      color: var(--ink-700);
    }
    .chat-input-row textarea::placeholder { color: var(--ink-400); }

    /* 发送按钮 */
    .btn-send {
      width: 40px; height: 40px; border-radius: var(--radius-md);
      background: var(--gradient-primary); color: white; border: none;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
      transition: transform 0.1s, box-shadow 0.15s, opacity 0.15s;
      flex-shrink: 0; position: relative;
      box-shadow: 0 2px 8px rgba(79,70,229,0.25);
    }
    .btn-send:hover:not(:disabled) {
      box-shadow: 0 4px 16px rgba(79,70,229,0.4);
      transform: scale(1.05);
    }
    .btn-send:active:not(:disabled) { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 发送按钮 loading */
    .btn-send .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    .btn-send.loading .spinner { display: block; }
    .btn-send.loading .btn-icon { display: none; }

    /* 模式徽章 */
    .mode-badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 10px; display: inline-block; margin-bottom: 4px;
    }
    .mode-badge.default      { background: rgba(58,107,196,0.12); color: var(--success); }
    .mode-badge.methodology  { background: rgba(196,107,58,0.12); color: #c46a3a; }
    .mode-badge.survey       { background: rgba(58,107,58,0.12); color: #3a7a3a; }

    /* ── Auth 表单 ──────────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .auth-card {
      width: 360px; background: white;
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .auth-card h2 { font-size: 24px; font-weight: 700; color: var(--ink-900); margin-bottom: 8px; text-align: center; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.03em; }
    .auth-card p  { font-size: 13px; color: var(--ink-500); margin-bottom: 24px; }
    .auth-card input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; font-family: inherit;
      margin-bottom: 12px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .auth-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .auth-card .btn-primary {

<script>
  /* ── 全局状态 ──────────────────────────────────────────── */
  let token = localStorage.getItem('token') || '';
  let userPhone = localStorage.getItem('phone') || '';
  let userId = localStorage.getItem('userId') || '';
  let plan = localStorage.getItem('plan') || 'free';
  let uploading = false;
  let sending = false;
  let chatMode = 'default';
  let folders = [];           // { folder_id, name, paper_count }
  let currentFolderId = null; // null = 全部论文
  let uploadFolderId = null;  // 上传时选择的文件夹

  const API = 'http://124.156.204.163:8080';

  /* ── Toast 通知系统 ─────────────────────────────────── */
  function showToast(msg, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
    toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      setTimeout(() => toast.remove(), 320);
    }, duration);
  }

  /* ── API 基础 ──────────────────────────────────────────── */
  async function api(method, path, body, noAuth, timeoutMs) {
    // 参数类型校验：noAuth 必须是 boolean，timeoutMs 必须是数字
    if (noAuth !== undefined && typeof noAuth !== 'boolean') {
      console.error('[api] 误用: 第4参数 noAuth 应为 false/true，实际为', typeof noAuth, '— 已修正');
    }
    if (timeoutMs !== undefined && typeof timeoutMs !== 'number') {
      console.error('[api] 误用: 第5参数 timeoutMs 应为数字，实际为', typeof timeoutMs);
    }
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), (typeof timeoutMs === 'number' ? timeoutMs : 30000));

    const headers = { 'Content-Type': 'application/json' };
    if (!noAuth) headers['Authorization'] = `Bearer ${token}`;
    const opts = { method, headers, signal: controller.signal };
    if (body) opts.body = JSON.stringify(body);

    let r;
    try {
      r = await fetch(API + path, opts);
    } catch (e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') {
        throw new Error(`请求超时（${((timeoutMs||30000)/1000).toFixed(0)}秒）— AI 生成需要较长时间，请稍后重试`);
      }
      throw new Error(`网络错误: ${e.message}`);
    }
    clearTimeout(timer);

    let rawText;
    try {
      rawText = await r.text();
    } catch {
      throw new Error(`HTTP ${r.status} — 响应读取失败`);
    }

    let data;
    try {
      data = JSON.parse(rawText);
    } catch {
      if (!rawText.trim()) {
        throw new Error(`请求超时（网络代理限制约60秒）— AI 生成需要 1-2 分钟，请减少问题复杂度`);
      }
      throw new Error(`HTTP ${r.status} — 服务器响应格式错误`);
    }

    if (!r.ok) {
      const msg = Array.isArray(data.detail)
        ? data.detail.map(e => e.msg || JSON.stringify(e)).join(', ')
        : (data.detail || `HTTP ${r.status}`);
      console.error('[API Error]', method, path, msg);
      throw new Error(msg);
    }
    return data;
  }

  /* ── Auth ──────────────────────────────────────────────── */
  function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-email').textContent = userPhone ? `📱 ${userPhone}` : '';
    loadFolders();
    loadQuota();
    // 恢复刷新前正在处理的论文轮询
    restorePendingUploads();
  }

  /* ── 断点续传：刷新后恢复上传/处理进度 ──────── */
  const PENDING_KEY = 'pending_uploads';

  function savePendingUploads(paperIds, folderId) {
    localStorage.setItem(PENDING_KEY, JSON.stringify({
      paperIds,
      folderId,
      timestamp: Date.now(),
    }));
  }

  function clearPendingUploads() {
    localStorage.removeItem(PENDING_KEY);
  }

  function getPendingUploads() {
    try {
      const raw = localStorage.getItem(PENDING_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      // 超过 30 分钟自动清理
      if (Date.now() - data.timestamp > 30 * 60 * 1000) {
        clearPendingUploads();
        return null;
      }
      return data;
    } catch { return null; }
  }

  async function restorePendingUploads() {
    const pending = getPendingUploads();
    if (!pending || !pending.paperIds || pending.paperIds.length === 0) return;
    const { paperIds, folderId } = pending;

    // 恢复上传文件夹上下文
    if (folderId) {
      uploadFolderId = folderId;
      renderUploadFolderSelect();
      const sel = document.getElementById('upload-folder-select');
      if (sel) sel.value = folderId;
    }

    // 找到还在 processing 的 paper
    const allIds = paperIds.join(',');
    try {
      const statuses = await api('GET', `/papers/batch-status?ids=${encodeURIComponent(allIds)}`);
      const stillProcessing = statuses.filter(s => s.status === 'processing');
      if (stillProcessing.length === 0) {
        clearPendingUploads();
        loadPapers();
        loadQuota();
        return;
      }

      // 恢复进度条 UI
      uploading = true;
      const zone = document.getElementById('upload-zone');
      const spinner = document.getElementById('upload-spinner');
      const progressDiv = document.getElementById('upload-progress');
      const fill = document.getElementById('progress-fill');
      const label = document.getElementById('progress-label');
      spinner.style.display = 'block';
      zone.classList.add('uploading');
      progressDiv.style.display = 'block';
      fill.style.width = '30%';
      label.textContent = `恢复监控 ${stillProcessing.length} 篇论文…`;

      showToast(`检测到 ${paperIds.length} 篇论文正在处理中，恢复监控…`, 'info');

      let pollCount = 0;
      const maxPolls = 300;

      function pollBatch() {
        pollCount++;
        api('GET', `/papers/batch-status?ids=${encodeURIComponent(allIds)}`).then(statuses => {
          const counts = { ready: 0, processing: 0, error: 0 };
          statuses.forEach(s => { if (s.status === 'ready') counts.ready++; else if (s.status === 'processing') counts.processing++; else counts.error++; });
          const total = statuses.length;
          const pct = Math.round(30 + (pollCount / maxPolls) * 68);
          fill.style.width = pct + '%';
          if (counts.ready === total) {
            fill.style.width = '100%';
            label.textContent = `全部完成（${total} 篇）`;
            progressDiv.style.display = 'none';
            showToast(`${total} 篇论文已上传并索引完成`, 'success');
            loadPapers();
            loadQuota();
            stopBatchPoll();
            clearPendingUploads();
          } else if (counts.error > 0 && counts.processing === 0) {
            progressDiv.style.display = 'none';
            showToast(`${counts.error} 篇索引失败，请查看论文列表`, 'error');
            loadPapers();
            stopBatchPoll();
            clearPendingUploads();
          } else {
            const done = counts.ready + counts.error;
            label.textContent = `索引中 ${done}/${total}…`;
            if (pollCount < maxPolls) {
              batchStatusTimer = setTimeout(pollBatch, 5000);
            } else {
              progressDiv.style.display = 'none';
              showToast('索引超时，请在论文列表查看状态', 'warning');
              loadPapers();
              stopBatchPoll();
              clearPendingUploads();
            }
          }
        }).catch(() => {
          if (pollCount < maxPolls) batchStatusTimer = setTimeout(pollBatch, 5000);
        });
      }

      batchStatusTimer = setTimeout(pollBatch, 2000);
    } catch(e) {
      clearPendingUploads();
    }
  }

  function stopBatchPoll() {
    if (batchStatusTimer) { clearTimeout(batchStatusTimer); batchStatusTimer = null; }
    uploading = false;
    const spinner = document.getElementById('upload-spinner');
    const zone = document.getElementById('upload-zone');
    const zoneText = document.getElementById('upload-zone-text');
    if (spinner) spinner.style.display = 'none';

  }

  /* ── 上传 ─────────────────────────────────────────────── */
  const uploadZone = document.getElementById('upload-zone');
  const fileInput  = document.getElementById('file-input');

  /* ── 批量上传 ─────────────────────────────────────── */
  let batchStatusTimer = null;

  uploadZone.addEventListener('click', () => { if (!uploading) fileInput.click(); });
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    if (uploading) return;
    const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.pdf'));
    if (files.length > 0) handleFiles(files);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      handleFiles(Array.from(fileInput.files));
      fileInput.value = ''; // reset so same file can be re-uploaded
    }
  });

  async function handleFiles(files) {
    if (!files || files.length === 0) return;
    // 前置检查
    const invalid = files.filter(f => !f.name.endsWith('.pdf'));
    if (invalid.length) { showToast('只支持 PDF 文件', 'error'); return; }
    const oversized = files.filter(f => f.size > 50 * 1024 * 1024);
    if (oversized.length) { showToast('部分文件超过 50MB 限制', 'error'); return; }

    uploading = true;
    const zone = document.getElementById('upload-zone');
    const spinner = document.getElementById('upload-spinner');
    const zoneText = document.getElementById('upload-zone-text');
    const progressDiv = document.getElementById('upload-progress');
    const fill = document.getElementById('progress-fill');
    const label = document.getElementById('progress-label');
    spinner.style.display = 'block';
    zone.classList.add('uploading');
    progressDiv.style.display = 'block';
    fill.style.width = '0%';

    if (files.length === 1) {
      zoneText.textContent = '正在上传…';
      label.textContent = '上传中…';
    } else {
      zoneText.textContent = `正在上传 ${files.length} 个文件…`;
      label.textContent = `上传中 0/${files.length}…`;
    }

    try {
      // ── 批量上传 ───────────────────────────────────
      const formData = new FormData();
      files.forEach(f => formData.append('files', f));
      formData.append('folder_id', uploadFolderId || '');

      const xhr = new XMLHttpRequest();
      const uploadPromise = new Promise((resolve, reject) => {
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            fill.style.width = pct + '%';
            if (files.length === 1) {
              label.textContent = `上传中 ${pct}%`;
            } else {
              label.textContent = `上传中 ${pct}%（${files.length} 个文件）`;
            }
          }
        };
        xhr.onload = () => {
          if (xhr.status === 200 || xhr.status === 201) {
            try {
              const resp = JSON.parse(xhr.responseText);
              resolve(resp);
            } catch { reject(new Error('响应格式错误')); }
          } else {
            try { const d = JSON.parse(xhr.responseText); reject(new Error(d.detail || `HTTP ${xhr.status}`)); }
            catch { reject(new Error(`上传失败 HTTP ${xhr.status}`)); }
          }
        };
        xhr.onerror = () => reject(new Error('网络错误'));
        xhr.open('POST', API + '/papers/batch-upload');
        xhr.setRequestHeader('Authorization', `Bearer ${token}`);
        xhr.send(formData);
      });

      const result = await uploadPromise;

      if (result.errors && result.errors.length > 0) {
        showToast('部分文件上传失败：' + result.errors[0], 'error');
      }

      // 更新 papers 列表（立即显示 processing 状态）
      loadPapers();
      loadQuota();

      const papers = result.papers || [];
      const allIds = papers.map(p => p.paper_id).join(',');
      // 保存到 localStorage，刷新后可断点续传
      savePendingUploads(papers.map(p => p.paper_id), uploadFolderId);

      if (papers.length === 1) {
        fill.style.width = '30%';
        label.textContent = '已上传，开始索引…';
      } else {
        fill.style.width = '30%';
        label.textContent = `已上传 ${papers.length} 个，开始并行索引…`;
        showToast(`已提交 ${papers.length} 个文件，正在并行处理…`, 'info');
      }

      // ── 轮询批量状态 ─────────────────────────────
      let pollCount = 0;
      const maxPolls = 300; // 最多轮询 25 分钟（300 × 5s）
      function pollBatch() {
        pollCount++;
        api('GET', `/papers/batch-status?ids=${encodeURIComponent(allIds)}`).then(statuses => {
          const counts = { ready: 0, processing: 0, error: 0 };
          statuses.forEach(s => { if (s.status === 'ready') counts.ready++; else if (s.status === 'processing') counts.processing++; else counts.error++; });
          const total = statuses.length;
          const pct = Math.round(30 + (pollCount / maxPolls) * 68);
          fill.style.width = pct + '%';
          if (counts.ready === total) {
            // 全部完成
            fill.style.width = '100%';
            label.textContent = `全部完成（${total} 篇）`;
            progressDiv.style.display = 'none';
            showToast(`${total} 篇论文已上传并索引完成`, 'success');
            loadPapers();
            loadQuota();
            stopBatchPoll();
          } else if (counts.error > 0 && counts.processing === 0) {
            // 全部结束（有错误）
            progressDiv.style.display = 'none';
            showToast(`${counts.error} 篇索引失败，请查看论文列表`, 'error');
            loadPapers();
            stopBatchPoll();
          } else {
            const done = counts.ready + counts.error;
            label.textContent = `索引中 ${done}/${total}…`;
            if (pollCount < maxPolls) {
              batchStatusTimer = setTimeout(pollBatch, 5000);
            } else {
              progressDiv.style.display = 'none';
              showToast('索引超时，请在论文列表查看状态', 'warning');
              loadPapers();
              stopBatchPoll();
            }
          }
        }).catch(() => {
          if (pollCount < maxPolls) batchStatusTimer = setTimeout(pollBatch, 5000);
        });
      }

      batchStatusTimer = setTimeout(pollBatch, 3000);

    } catch(e) {
      console.error('[Upload Error]', e);
      showToast('上传失败：' + e.message, 'error');
      progressDiv.style.display = 'none';
      clearPendingUploads();
      stopBatchPoll();
    } finally {
      uploading = false;
      spinner.style.display = 'none';
      zone.classList.remove('uploading');
      zoneText.textContent = '📄 拖拽 PDF 到这里，或点击选择文件';
    }
  }

  /* ── 文件夹管理 ──────────────────────────────────────── */
  async function loadFolders() {
    try {
      folders = await api('GET', '/papers/folders');
      renderFolderTree();
      // 默认选中第一个文件夹，并加载其论文
      if (folders.length > 0) {
        selectFolder(folders[0].folder_id);
        uploadFolderId = folders[0].folder_id;
      } else {
        currentFolderId = null;
        loadPapers();
      }
      renderUploadFolderSelect();
    } catch(e) {
      console.error('加载文件夹失败:', e);
    }
  }

  function renderFolderTree() {
    const container = document.getElementById('folder-list');
    if (!folders || folders.length === 0) {
      container.innerHTML = '<div style="font-size:13px;color:var(--ink-400);padding:4px 10px;">暂无文件夹</div>';
      return;
    }
    container.innerHTML = folders.map(f => `
      <div class="folder-item${f.folder_id === currentFolderId ? ' active' : ''}" data-id="${f.folder_id}" onclick="selectFolder('${f.folder_id}')">
        <span class="folder-icon">📁</span>
        <span class="folder-name" title="${f.name}">${f.name}</span>
        <span class="folder-count">${f.paper_count || 0}</span>
        <div class="folder-actions">
          <button class="rename-btn" title="重命名" onclick="event.stopPropagation(); showRenameModal('${f.folder_id}','${f.name}')">✏️</button>
          <button class="delete-btn" title="删除" onclick="event.stopPropagation(); deleteFolder('${f.folder_id}')">🗑️</button>
        </div>
      </div>`).join('');
  }

  async function selectFolder(folderId) {
    currentFolderId = folderId;
    renderFolderTree();
    await loadPapers();
    // 更新上传组件的默认文件夹
    const sel = document.getElementById('upload-folder-select');
    if (sel) sel.value = folderId;

  function renderUploadFolderSelect() {
    const sel = document.getElementById('upload-folder-select');
    if (!sel) return;
    sel.innerHTML = folders.map(f => `<option value="${f.folder_id}">${f.name}</option>`).join('');
    if (uploadFolderId) sel.value = uploadFolderId;
    else if (folders.length > 0) { uploadFolderId = folders[0].folder_id; sel.value = uploadFolderId; }

  }

  /* ── 论文列表 ─────────────────────────────────────────── */
  async function loadPapers() {
    try {
      const url = currentFolderId ? `/papers?folder_id=${currentFolderId}` : '/papers';
      const papers = await api('GET', url);
      const container = document.getElementById('papers-container');
      if (!papers || papers.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📚</div>
            <div class="empty-title">还没有上传论文</div>
            <div class="empty-desc">拖拽 PDF 到上方，或点击上传区域<br/>开始构建你的学术知识库</div>
          </div>`;
        return;
      }
      container.innerHTML = papers.filter(p => p.status === 'ready').map(p => `
        <div class="paper-item" data-paper-id="${escapeHtml(p.paper_id)}">
          <input type="checkbox" class="paper-check" data-paper-id="${escapeHtml(p.paper_id)}" onclick="event.stopPropagation()" style="flex-shrink:0;width:16px;height:16px;cursor:pointer;accent-color:var(--accent);" />
          <div class="paper-body">
            <div class="title">${escapeHtml(p.title)}</div>
            <div class="meta">${
              p.doi ? '<span class="paper-doi">📄 ' + escapeHtml(p.doi) + '</span>'
              : p.journal ? '<span class="paper-journal">📰 ' + escapeHtml(p.journal) + (p.year ? ' (' + p.year + ')' : '') + '</span>'
              : p.authors ? '<span class="paper-authors">👤 ' + escapeHtml(p.authors) + '</span>'
              : ''
            }</div>
            <span class="status ${p.status}" id="status-${p.paper_id}">${
              p.status === 'ready' ? '✅ 已索引'
              : p.status === 'processing' ? '⏳ 索引中'
              : '❌ 失败'
            }</span>
          </div>
          <div class="paper-actions">
            <button class="action-btn cite-btn" data-action="cite" data-id="${escapeHtml(p.paper_id)}" data-title="${escapeHtml(p.title)}">📎 引用</button>
            <button class="action-btn delete-btn" data-action="delete" data-id="${escapeHtml(p.paper_id)}" data-title="${escapeHtml(p.title)}">🗑️</button>
          </div>
        </div>`).join('');

      // 事件委托：论文卡片按钮
      container.querySelectorAll('.paper-actions button').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const action = btn.dataset.action;
          const paperId = btn.dataset.id;
          const title = btn.dataset.title;
          if (action === 'cite') {
            insertPaperCitation(paperId, title);
          } else if (action === 'delete') {
            confirmDelete(paperId, title);
          }
        });
      });
    } catch(e) {
      console.error('[LoadPapers Error]', e);
    }
  }

  async function confirmDelete(paperId, title) {
    if (!confirm(`确定删除论文 "${title}" 吗？\n\n删除后该论文的所有片段将从知识库中移除，且无法恢复。`)) return;
    try {
      await api('DELETE', `/papers/${paperId}`);
      showToast('论文已删除', 'success');
      loadPapers();
      loadQuota();
    } catch(e) {
      showToast('删除失败：' + e.message, 'error');
    }
  }

  /* ── 论文引用 ─────────────────────────────────────── */
  function insertPaperCitation(paperId, title) {
    const input = document.getElementById('chat-input');
    const sep = input.value.trim() ? ' ' : '';
    // 追加格式：引用论文：{标题}
    input.value += sep + `引用论文：${title}`;
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
    input.focus();
    showToast(`已引用：${title}`, 'success');
  }

  /* ── 配额 ─────────────────────────────────────────── */
  async function loadQuota() {
    try {
      const me = await api('GET', '/me/quota');
      plan = me.plan || 'free';
      const used = me.papers_used || 0;
      const limit = me.papers_limit;
      document.getElementById('plan-label').textContent = plan === 'pro' ? 'Pro' : 'Free';
      const limitTxt = limit ? `已上传 ${used} / ${limit} 篇` : `已上传 ${used} 篇`;
      document.getElementById('papers-label').textContent = limitTxt;
    } catch(e) { console.error('[LoadQuota Error]', e); }
  }

  /* ── 聊天模式 ─────────────────────────────────────────── */
  function setChatMode(mode) {
    chatMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
  }

  /* ── 发送消息 ─────────────────────────────────────────── */
  document.getElementById('btn-send').onclick = sendMessage;
  document.getElementById('chat-input').onkeydown = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('btn-send');
    const errEl = document.getElementById('chat-error');
    errEl.classList.add('hidden');

    // 显示用户消息
    const msgs = document.getElementById('chat-messages');
    const userMsgEl = document.createElement('div');
    userMsgEl.className = 'msg user';
    userMsgEl.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    msgs.appendChild(userMsgEl);
    input.value = '';
    input.style.height = 'auto';

        // 答案气泡（流式渲染，只显示 Markdown 回答）
    const assistantEl = document.createElement('div');
    assistantEl.className = 'msg assistant';
    const modeLabel = chatMode === 'methodology' ? '🔬 方法论审计' : chatMode === 'survey' ? '📝 文献综述' : '';
    const modeBadge = modeLabel ? `<span class="mode-badge ${chatMode}">${modeLabel}</span>` : '';
    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'bubble';
    // 等待提示：打字动画 + 状态文字
    const waitEl = document.createElement('div');
    waitEl.className = 'wait-indicator';
    waitEl.innerHTML = '<span class="wait-dots"><span></span><span></span><span></span></span><span class="wait-text">正在检索论文并生成答案…</span>';
    bubbleEl.appendChild(waitEl);
    assistantEl.innerHTML = modeBadge;
    assistantEl.appendChild(bubbleEl);
    msgs.appendChild(assistantEl);
    msgs.scrollTop = msgs.scrollHeight;

    sending = true;
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const resp = await fetch(API + '/chat/stream', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          question: text,
          folder_ids: currentFolderId ? [currentFolderId] : null,
          top_k: 3,
          mode: chatMode,
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: `HTTP ${resp.status}` }));
        throw new Error(Array.isArray(err.detail) ? err.detail.map(e => e.msg).join(', ') : (err.detail || `HTTP ${resp.status}`));
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();

      // 流式 SSE：过滤思考块，只渲染 Markdown
      let done = false;
      let lineBuf = '';
      let tokBuf = '';

      // 提取思考块（不删除），返回 { thinking, answer }
      const extractThinking = (text) => {
        const thinkingBlocks = [];
        const clean = text
          .replace(/<think[ing]*>([\s\S]*?)<\/think>/gi, (_, inner) => {
            const trimmed = inner.trim();
            if (trimmed) thinkingBlocks.push(trimmed);
            return '';
          })
          .replace(/<THINK[\s\S]*?<\/THINK>/gi, '');
        return { thinking: thinkingBlocks, answer: clean };
      };

      // 去掉 LLM 错误生成的页码引用（如 "📄 p.12"），不是有效 citation
      const stripPageRefs = (text) => {
        return text.replace(/📄\s*p\.?\s*\d+/gi, '').replace(/p\.\s*\d+/g, '').trim();
      };

      // 检测文本是否为引用/参考文献内容（LLM 乱写的引用列表）
      // marked.js 配置：禁用默认乱码处理
      if (typeof marked !== 'undefined') {
        marked.use({ mangle: false, headerIds: false });
      }

      // 判断一个 heading token 的文字内容是否属于"引用/参考文献"类型
      const isRefHeading = (text) => {
        if (!text) return false;
        const t = text.trim();
        // 明确引用类标题
        if (/引用论文|参考文献|References?|文献标志码/.test(t)) return true;
        // 综述总结+信息/检索类（"综述总结：关于xxx"、"信息不足"）
        if (/^(?:\S+\s*)*[综述总结].*?(?:信息不足|检索结果|片段|文献库)/.test(t)) return true;
        // "关于xxx的说明/分析/评估" 整块
        if (/^关于.{0,30}(?:说明|分析|评估|信息不足)/.test(t)) return true;
        // 结论建议摘要块（整块内容都是结论/建议，无实质性正文）
        if (/^(?:结论|建议|研究发现|主要结论)/.test(t)) return true;
        // "格式：" 开头（参考文献格式说明）
        if (/^格式：/.test(t)) return true;
        return false;
      };

      // 在 marked token 数组中，去掉引用整块（从引用标题到同级标题之前）
      const stripReferenceTokens = (tokens) => {
        const result = [];
        let skipUntilLevel = 0; // 0=不跳过；1/2/3=跳过到同级或更低级标题
        for (let i = 0; i < tokens.length; i++) {
          const tok = tokens[i];
          if (tok.type === 'heading') {
            if (isRefHeading(tok.text)) {
              skipUntilLevel = tok.depth; // 标记：跳过直到同级或更低级标题
              continue; // 丢弃当前引用标题本身
            } else {
              skipUntilLevel = 0; // 遇到非引用标题，重置
            }
          }
          if (skipUntilLevel > 0) {
            // 如果当前 token 是同级/更低级标题，说明引用块已结束
            if (tok.type === 'heading' && tok.depth <= skipUntilLevel) {
              skipUntilLevel = 0;
              result.push(tok);
            }
            // 否则跳过（丢弃引用块内容）
            continue;
          }
          result.push(tok);
        }
        return result;
      };

      // 渲染 bubble 内所有 KaTeX 数学公式（块级 + 行内）
      const renderMathAll = (bubble) => {
        if (typeof renderMathInElement !== 'function') return;
        try {
          renderMathInElement(bubble, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
            ],
            throwOnError: false,
            errorColor: '#dc2626',
          });
        } catch(e) {
          // KaTeX 渲染失败不影响页面显示
        }
      };

      // 将一行文本渲染为单行 markdown HTML（不加 outer <p>）
      const renderMarkdownLine = (line) => {
        if (!line.trim()) return '';
        // 块级公式 $$...$$ 整行替换
        if (/^\$\$.+\$\$$/s.test(line)) {
          const formula = line.replace(/^\$\$|\$\$$/g, '');
          const id = 'katex-block-' + Math.random().toString(36).slice(2, 8);
          return `<div class="katex-display" id="${id}" data-formula="${encodeURIComponent(formula)}"></div>`;
        }
        // 先做 markdown 替换，再做 HTML 转义（避免 & 吃掉 ** 两边的字符）
        const md = line
          .replace(/^> (.+)$/, '<blockquote>$1</blockquote>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
          .replace(/(?<!_)_(?!_)(.+?)(?<!_)_(?!_)/g, '<em>$1</em>')
          .replace(/~~(.+?)~~/g, '<del>$1</del>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/^### (.+)$/, '<h3>$1</h3>')
          .replace(/^## (.+)$/, '<h2>$1</h2>')
          .replace(/^# (.+)$/, '<h1>$1</h1>')
          .replace(/([^`$])\$(.+?)\$([^$])/g, '$1<span class="katex-inline" data-formula="$2"></span>$3');
        // HTML 转义最后做
        return md
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      };

      // 将 markdown 转换为 HTML
      const renderMarkdown = (text) => {
        if (!text || !text.trim()) return;
        // 去掉页码标注（如 "📄 p.12"），引用块在 AST 层统一过滤
        text = stripPageRefs(text);
        if (!text.trim()) return;

        // marked.js 解析为 token 数组 → 过滤引用 → 渲染为 HTML
        const tokens = (typeof marked !== 'undefined')
          ? marked.lexer(text)
          : [{ type: 'text', raw: text }]; // fallback
        const cleaned = stripReferenceTokens(tokens);
        const html = (typeof marked !== 'undefined')
          ? new marked.Parser().parse(cleaned)
          : text;
        if (html) { bubbleEl.innerHTML += html; msgs.scrollTop = msgs.scrollHeight; }
        renderMathAll(bubbleEl);
      };

      // 将思考内容渲染为可折叠块（默认收起）
      const renderThinkingBlocks = (blocks) => {
        if (!blocks || blocks.length === 0) return;
        const details = document.createElement('details');
        details.className = 'thinking-block';
        const summary = document.createElement('summary');
        const count = blocks.length;
        summary.innerHTML = `<span class="thinking-label"><span>💭</span><span style="font-weight:700">思考过程</span><span style="opacity:0.8;font-size:11px">(${count} 条，点击展开)</span></span><span class="toggle-icon">▶</span>`;
        details.appendChild(summary);
        blocks.forEach((blk, i) => {
          // 思考内容也支持 markdown 格式（加粗、斜体、代码、公式）
          const p = document.createElement('div');
          p.className = 'thinking-content';
          // 用 renderMarkdownLine 处理每一行
          const lines = blk.split('\n');
          p.innerHTML = lines.map(l => {
            if (!l.trim()) return '';
            if (/^\$\$.+\$\$$/s.test(l)) {
              const formula = l.replace(/^\$\$|\$\$$/g, '');
              const id = 'katex-block-' + Math.random().toString(36).slice(2, 8);
              return `<div class="katex-display" id="${id}" data-formula="${encodeURIComponent(formula)}"></div>`;
            }
            const md = l
              .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
              .replace(/__(.+?)__/g, '<strong>$1</strong>')
              .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
              .replace(/~~(.+?)~~/g, '<del>$1</del>')
              .replace(/`([^`]+)`/g, '<code>$1</code>')
              .replace(/([^`$])\$(.+?)\$([^$])/g, '$1<span class="katex-inline" data-formula="$2"></span>$3');
            return md
              .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          }).join('<br>');
          if (i > 0) p.style.marginTop = '6px';
          details.appendChild(p);
        });
        // 思考块渲染完后触发 KaTeX
        renderMathAll(details);
        bubbleEl.appendChild(details);
      };

      const flushLine = () => {
        const line = lineBuf.trim();
        lineBuf = '';
        if (!line.startsWith('data: ')) return;
        const dataStr = line.slice(6);
        try {
          const data = JSON.parse(dataStr);
          if (data.type === 'token') {
            // 第一个 token 到达时移除等待提示
            if (tokBuf === '') {
              waitEl.remove();
            }
            tokBuf += data.content;
          } else if (data.type === 'done') {
            const { thinking, answer } = extractThinking(tokBuf);
            // stripPageRefs 在 renderMarkdown 内部处理，引用块由 AST 层过滤
            renderThinkingBlocks(thinking);
            // 无论有没有思考块，正式回答前都加标题
            const ansHeader = document.createElement('div');
            ansHeader.className = 'answer-header';
            ansHeader.innerHTML = '<span class="answer-icon">💡</span><span>正式回答</span>';
            bubbleEl.appendChild(ansHeader);
            if (answer && answer.trim()) {
              // renderMarkdown 内部处理：页码过滤 → AST 过滤 → marked 渲染
              const esc = answer.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
              renderMarkdown(esc);
              renderMathAll(bubbleEl);
            } else {
              renderMathAll(bubbleEl);
            }
            // 渲染引用来源（论文标题+页码）- 暂时隐藏
            // if (data.citations && data.citations.length > 0) {
            //   const citeEl = document.createElement('div');
            //   citeEl.className = 'citations';
            //   citeEl.innerHTML = '<div class="cite-label">参考文献：</div>' +
            //     data.citations.map(c => {
            //       const title = c.title || '未知论文';
            //       const page = c.page ? ` 第${c.page}页` : '';
            //       return `<span class="cite">${title}${page}</span>`;
            //     }).join('');
            //   assistantEl.appendChild(citeEl);
            // }
            // 质量警告
            if (data.quality_warning) {
              const warnEl = document.createElement('div');
              warnEl.className = 'quality-warn';
              warnEl.textContent = data.quality_warning;
              assistantEl.appendChild(warnEl);
            }
            done = true;
          } else if (data.type === 'error') {
            throw new Error(data.message || '流式生成失败');
          }
        } catch {}
      };

      while (!done) {
        const { value, done: streamDone } = await reader.read();
        done = streamDone;
        if (value) {
          const text = decoder.decode(value, { stream: !done });
          for (const ch of text) {
            if (ch === '\n') {
              if (lineBuf.trim()) flushLine();
              lineBuf = '';
            } else if (ch !== '\r') {
              lineBuf += ch;
            }
          }
        }
      }
    } catch(e) {
      msgs.removeChild(assistantEl);
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
      showToast('发送失败：' + e.message, 'error');
    } finally {
      sending = false;
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  /* ── 工具函数 ─────────────────────────────────────────── */
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 启动检查 ─────────────────────────────────────────── */
  if (token) {
    api('GET', '/me/quota').then(me => {
      userPhone = localStorage.getItem('phone') || '';
      userId = localStorage.getItem('userId') || '';
      plan = me.plan || 'free';
      showApp();
    }).catch(() => {
      logout();
    });
  }
</script>
<script>
// ── 全局未捕获 Promise 错误（防止静默失败）─────────────
window.addEventListener('unhandledrejection', e => {
  console.error('[UnhandledPromiseRejection]', e.reason);
  if (e.reason instanceof Error && !window._toastActive) {
    window._toastActive = true;
    const el = document.createElement('div');
    el.style = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#fee2e2;color:#991b1b;padding:8px 16px;border-radius:8px;z-index:9999;font-size:13px;max-width:90vw;word-break:break-all;';
    el.textContent = '系统错误：' + (e.reason.message || String(e.reason)).substring(0, 100);
    document.body.appendChild(el);
    setTimeout(() => { el.remove(); window._toastActive = false; }, 8000);
  }
});
</script>
</body>
