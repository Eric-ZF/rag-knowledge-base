<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 学术知识库 — Phase 0 验证</title>
  <style>
    /* ── 基础重置 ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink-900: #1a1a2e;
      --ink-700: #2d2d44;
      --ink-500: #5c5c7a;
      --ink-400: #9b97a8;
      --paper:   #faf9f7;
      --accent:  #2563EB;          /* 专业学术蓝 */
      --accent-hover: #1D4ED8;
      --border:  #e8e6e3;
      --success: #059669;          /* 绿色：成功/已索引 */
      --danger:  #DC2626;          /* 红色：错误/删除 */
      --warning: #D97706;           /* 橙色：警告/处理中 */
      --shadow:  0 2px 8px rgba(0,0,0,0.08);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    body {
      font-family: 'IBM Plex Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--paper);
      color: var(--ink-700);
      min-height: 100vh;
    }

    /* ── Toast 通知 ─────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 68px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 320px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      animation: toastIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      pointer-events: auto;
    }
    .toast.success { background: #1a5c3a; color: #fff; }
    .toast.error   { background: var(--danger); color: #fff; }
    .toast.info    { background: var(--ink-700); color: #fff; }
    .toast.warning  { background: var(--warning); color: #fff; }
    .toast.fade-out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px) scale(0.95); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    /* ── 顶栏 ─────────────────────────────────────────────── */
    header {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; color: var(--ink-900); }
    header .badge {
      font-size: 11px; padding: 2px 8px;
      background: var(--accent); color: #fff;
      border-radius: 10px;
    }
    .header-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
    #user-email { font-size: 13px; color: var(--ink-500); }

    /* ── 主布局 ─────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 56px);
    }

    /* 移动端：单列堆叠 */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: calc(100vh - 56px);
      }
      .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 45vh;
        overflow-y: auto;
      }
      .panel-right {
        min-height: 55vh;
      }
      .quota-banner {
        margin: 12px 16px 0;
        font-size: 12px;
      }
      .chat-messages {
        padding: 12px 16px;
      }
      .chat-input-area {
        padding: 10px 16px 16px;
      }
      .msg {
        max-width: 92%;
      }
      header {
        padding: 0 16px;
      }
    }

    /* ── 左侧：上传 + 论文列表 ─────────────────────────────── */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 拖拽上传区 */
    .upload-zone {
      margin: 24px;
      padding: 36px 24px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(196, 75, 58, 0.04);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .upload-zone:active { transform: scale(0.99); }
    .upload-zone p { color: var(--ink-500); font-size: 14px; }
    .upload-zone .hint { font-size: 12px; margin-top: 4px; color: var(--ink-400); }

    /* 上传区 loading 态 */
    .upload-zone.uploading {
      pointer-events: none;
      border-color: var(--success);
      background: rgba(58, 107, 196, 0.04);
    }
    .upload-zone.uploading p { color: var(--success); }
    .upload-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 论文列表 */
    .paper-list { flex: 1; overflow-y: auto; padding: 0 24px 24px; }
    .paper-list h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-500);
      margin-bottom: 12px;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--ink-400);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
    .empty-state .empty-title { font-size: 14px; font-weight: 500; color: var(--ink-500); margin-bottom: 6px; }
    .empty-state .empty-desc { font-size: 12px; color: var(--ink-400); line-height: 1.5; }

    /* 论文卡片 */
    .paper-item {
      padding: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .paper-item:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, 0.4);
    }
    .paper-item .paper-body { flex: 1; min-width: 0; }
    .paper-item .title { font-size: 14px; font-weight: 500; color: var(--ink-900); }
    .paper-item .meta { font-size: 12px; color: var(--ink-500); margin-top: 4px; }
    .paper-item .status {
      display: inline-block; font-size: 11px;
      padding: 1px 6px; border-radius: 4px; margin-top: 6px;
    }
    /* 卡片右侧操作按钮区 */
    .paper-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      align-items: stretch;
    }
    .paper-actions .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: var(--ink-600);
      white-space: nowrap;
      transition: all 0.15s;
    }
    .paper-actions .cite-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(37,99,235,0.06);
    }
    .paper-actions .delete-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(220,38,38,0.06);
    }

    .status.ready       { background: rgba(58,107,196,0.12); color: var(--success); }
    .status.processing  { background: rgba(196,75,58,0.12); color: var(--accent); }
    .status.error       { background: rgba(217,54,54,0.12); color: var(--danger); }

    /* 进度条 */
    .progress-bar-wrap {
      margin: 8px 0 0; background: #eee;
      border-radius: 6px; height: 5px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), #e05a3a);
      border-radius: 6px; transition: width 0.35s ease; width: 0%;
    }
    .progress-label { font-size: 12px; color: var(--ink-500); margin-top: 4px; }

    /* ── 右侧：RAG 问答 ─────────────────────────────────── */
    .panel-right {
      display: flex; flex-direction: column;
      overflow: hidden; background: #f5f4f2;
    }

    /* Quota Banner */
    .quota-banner {
      margin: 20px 24px 0;
      padding: 10px 16px;
      background: white; border-radius: var(--radius-md);
      border: 1px solid var(--border);
      font-size: 13px; display: flex; gap: 12px; align-items: center;
    }
    .quota-banner .plan { font-weight: 600; color: var(--accent); }
    .quota-banner .papers { color: var(--ink-500); margin-left: auto; }

    /* Chat 区域 */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 16px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .msg { max-width: 85%; display: flex; flex-direction: column; gap: 4px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg .bubble {
      padding: 11px 15px; border-radius: 14px;
      font-size: 14px; line-height: 1.65;
    }
    .msg.user .bubble {
      background: var(--accent); color: white;
      border-bottom-right-radius: 4px;
      transition: background 0.15s;
    }
    .msg.user .bubble:hover { background: var(--accent-hover); }
    .msg.assistant .bubble {
      background: white; color: var(--ink-700);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      padding: 12px 15px;
      font-size: 14px;
      line-height: 1.65;
    }
    /* Markdown 标题在气泡内 */
    .msg.assistant .bubble h1 { font-size: 17px; font-weight: 700; margin: 8px 0 4px; color: #1a1a2e; }
    .msg.assistant .bubble h2 { font-size: 15px; font-weight: 700; margin: 6px 0 3px; color: #1a1a2e; }
    .msg.assistant .bubble h3 { font-size: 13px; font-weight: 600; margin: 5px 0 2px; color: #2d2d44; }
    .msg.assistant .bubble li { margin-left: 16px; padding-left: 4px; }
    .msg.assistant .bubble strong { font-weight: 700; color: #1a1a2e; }
    .msg.assistant .bubble em { font-style: italic; color: #555; }
    .msg.assistant .bubble code { background: #f3f2f0; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .msg.assistant .bubble blockquote {
      border-left: 3px solid #2563EB;
      margin: 6px 0; padding: 4px 10px;
      background: #f0f4ff; border-radius: 0 4px 4px 0;
      color: #1a1a2e; font-size: 13.5px;
    }
    .msg.assistant .bubble del { text-decoration: line-through; color: #9b97a8; }
    .msg.assistant .bubble .katex-inline { padding: 0 2px; }
    .msg.assistant .bubble blockquote .katex-display { margin: 4px 0; }
    /* Markdown 表格 */
    .msg.assistant .bubble .md-table {
      border-collapse: collapse;
      width: auto;
      max-width: 100%;
      margin: 8px 0;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .msg.assistant .bubble .md-table th {
      background: #f0f4ff;
      padding: 6px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--ink-700);
      font-size: 12.5px;
    }
    .msg.assistant .bubble .md-table td {
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--ink-700);
    }
    .msg.assistant .bubble .md-table tr:last-child td { border-bottom: none; }
    .msg.assistant .bubble .md-table tr:nth-child(even) td { background: #faf9f7; }
    .msg.assistant .bubble strong { font-weight: 700; color: #1a1a2e; }
    .msg.assistant .bubble em { font-style: italic; color: #555; }
    /* 引用 */
    .msg.assistant .citations {
      padding-top: 10px; margin-top: 10px;
      border-top: 1px solid var(--border);
    }
    .msg.assistant .citations .cite-label {
      font-size: 11px; color: var(--ink-400);
      margin-bottom: 5px; font-weight: 600;
    }
    .msg.assistant .citations .cite {
      padding: 3px 10px; background: #f0eeeb;
      border-radius: 4px; display: inline-block;
      margin: 2px 6px 2px 0; font-size: 12px;
      color: var(--ink-600); font-weight: 500;
      border: 1px solid #e5e3df;
      transition: background 0.15s;
    }
    .msg.assistant .citations .cite:hover { background: #e8e6e3; }

    /* 质量警告 */
    .msg.assistant .quality-warn {
      margin-top: 10px; padding: 8px 12px;
      background: #fef3cd; border: 1px solid #ffc107;
      border-radius: 6px; font-size: 12px; color: #856404;
      line-height: 1.5;
    }
    /* 可折叠思考过程块 */
    .msg.assistant .thinking-block {
      background: #f8f7ff;
      border: 1px solid #dedaff;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      overflow: hidden;
    }
    .msg.assistant .thinking-block summary {
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 600;
      color: #6b5ce7;
      font-size: 12px;
      user-select: none;
      list-style: none;
    }
    .msg.assistant .thinking-block summary::-webkit-details-marker { display: none; }
    .msg.assistant .thinking-block summary::after {
      content: ' ▶';
      font-size: 10px;
      opacity: 0.6;
    }
    .msg.assistant .thinking-block[open] summary::after { content: ' ▼'; }
    .msg.assistant .thinking-block[open] summary {
      border-bottom: 1px solid #dedaff;
      background: #f0efff;
    }
    .msg.assistant .thinking-block .thinking-content {
      padding: 8px 12px 10px;
      color: #6b6891;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12.5px;
    }
    /* 思考与回答之间的分隔 */
    .msg.assistant .answer-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0 8px;
    }
    .msg.assistant .answer-divider::before,
    .msg.assistant .answer-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0deff;
    }
    .msg.assistant .answer-divider span {
      font-size: 11.5px;
      font-weight: 700;
      color: #2563EB;
      white-space: nowrap;
      letter-spacing: 0.04em;
      background: #f0f4ff;
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid #c7d9ff;
    }

    /* 消息出现动画 */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .msg { animation: msgIn 0.22s ease both; }

    /* typing 动画 */
    .typing-dots {
      display: inline-flex; gap: 4px; align-items: center;
      padding: 14px 16px; background: white;
      border: 1px solid var(--border);
      border-radius: 14px; border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink-400); display: block;
      animation: typingBounce 1.1s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    /* 等待提示 */
    .wait-indicator {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0;
    }
    .wait-dots {
      display: inline-flex; gap: 3px; align-items: center;
    }
    .wait-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--ink-400); display: block;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .wait-dots span:nth-child(2) { animation-delay: 0.2s; }
    .wait-dots span:nth-child(3) { animation-delay: 0.4s; }
    .wait-text {
      color: var(--ink-400); font-size: 13px;
      letter-spacing: 0.01em;
    }

    /* Chat 输入 */
    .chat-input-area {
      padding: 14px 24px 20px;
      background: #f5f4f2;
    }
    .chat-mode-row {
      display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .mode-btn {
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: white;
      color: var(--ink-500); font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .chat-input-row {
      display: flex; gap: 8px;
      background: white; border: 1.5px solid var(--border);
      border-radius: 12px; padding: 8px 12px;
      align-items: flex-end;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .chat-input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 75, 58, 0.1);
    }
    .chat-input-row textarea {
      flex: 1; border: none; outline: none;
      font-size: 14px; font-family: inherit;
      resize: none; min-height: 24px; max-height: 120px;
      line-height: 1.5; background: transparent;
      color: var(--ink-700);
    }
    .chat-input-row textarea::placeholder { color: var(--ink-400); }

    /* 发送按钮 */
    .btn-send {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      background: var(--accent); color: white; border: none;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      flex-shrink: 0; position: relative;
    }
    .btn-send:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-send:active:not(:disabled) { transform: scale(0.94); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 发送按钮 loading */
    .btn-send .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    .btn-send.loading .spinner { display: block; }
    .btn-send.loading .btn-icon { display: none; }

    /* 模式徽章 */
    .mode-badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 10px; display: inline-block; margin-bottom: 4px;
    }
    .mode-badge.default      { background: rgba(58,107,196,0.12); color: var(--success); }
    .mode-badge.methodology  { background: rgba(196,107,58,0.12); color: #c46a3a; }
    .mode-badge.survey       { background: rgba(58,107,58,0.12); color: #3a7a3a; }

    /* ── Auth 表单 ──────────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .auth-card {
      width: 360px; background: white;
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .auth-card h2 { font-size: 20px; color: var(--ink-900); margin-bottom: 6px; }
    .auth-card p  { font-size: 13px; color: var(--ink-500); margin-bottom: 24px; }
    .auth-card input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; font-family: inherit;
      margin-bottom: 12px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .auth-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 75, 58, 0.1);
    }
    .auth-card .btn-primary {
      width: 100%; padding: 11px;
      background: var(--accent); color: white; border: none;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 4px; transition: background 0.15s, transform 0.1s;
    }
    .auth-card .btn-primary:hover { background: var(--accent-hover); }
    .auth-card .btn-primary:active { transform: scale(0.99); }
    .auth-card .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-card .toggle {
      text-align: center; margin-top: 16px;
      font-size: 13px; color: var(--ink-500);
    }
    .auth-card .toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }

    /* ── 工具函数 ────────────────────────────────────────────── */
    .hidden { display: none !important; }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; text-align: center; }

    /* ── KaTeX 数学公式 ─────────────────────────────────────── */
    .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; }
    .katex { font-size: 1.05em; }

    /* ── 改进后的思考块（更醒目）────────────────────────────── */
    .msg.assistant .thinking-block {
      background: #f0efff;
      border: 1.5px solid #a78bfa;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(167,139,250,0.15);
    }
    .msg.assistant .thinking-block summary {
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 700;
      color: #6d28d9;
      font-size: 12.5px;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ede9fe;
    }
    .msg.assistant .thinking-block summary::-webkit-details-marker { display: none; }
    .msg.assistant .thinking-block summary .toggle-icon {
      margin-left: auto;
      font-size: 11px;
      opacity: 0.7;
      transition: transform 0.2s;
    }
    .msg.assistant .thinking-block[open] summary .toggle-icon { transform: rotate(180deg); }
    .msg.assistant .thinking-block[open] summary {
      border-bottom: 1px solid #c4b5fd;
      background: #ede9fe;
    }
    .msg.assistant .thinking-block .thinking-content {
      padding: 10px 14px 12px;
      color: #4c1d95;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12.5px;
    }

    /* ── 改进后的回答分隔线（更醒目）────────────────────────── */
    .msg.assistant .answer-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 10px;
    }
    .msg.assistant .answer-divider::before,
    .msg.assistant .answer-divider::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: linear-gradient(to right, transparent, #c7d2fe, transparent);
    }
    .msg.assistant .answer-divider span {
      font-size: 11px;
      font-weight: 800;
      color: #4338ca;
      white-space: nowrap;
      letter-spacing: 0.06em;
      background: #eef2ff;
      padding: 3px 12px;
      border-radius: 20px;
      border: 1.5px solid #c7d2fe;
    }
  </style>
  <!-- KaTeX 数学公式支持 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

<!-- ── Toast 通知 ──────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Auth 登录/注册 ──────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <h2>📚 RAG 学术知识库</h2>
    <p>Phase 0 验证 · 请登录或注册</p>
    <div id="auth-error" class="error-msg hidden"></div>
    <input id="email-input"    type="email"    placeholder="邮箱地址" autocomplete="email" />
    <input id="password-input" type="password" placeholder="密码"    autocomplete="current-password" />
    <button class="btn-primary" id="btn-login">登录</button>
    <p class="toggle">还没有账号？<a id="btn-show-register">立即注册</a></p>
  </div>
</div>

<!-- ── 主界面 ─────────────────────────────────────────── -->
<div id="app" class="hidden">
  <header>
    <h1>📚 RAG 学术知识库</h1>
    <span class="badge">Phase 0</span>
    <div class="header-right">
      <span id="user-email"></span>
      <button onclick="logout()" style="font-size:12px;cursor:pointer;border:none;background:none;color:var(--ink-500);text-decoration:underline;">退出</button>
    </div>
  </header>

  <main>
    <!-- 左侧：上传 + 列表 -->
    <div class="panel-left">
      <div class="upload-zone" id="upload-zone">
        <div class="upload-spinner" id="upload-spinner" style="display:none"></div>
        <p id="upload-zone-text">📄 拖拽 PDF 到这里，或点击选择文件</p>
        <p class="hint">仅支持 PDF · 免费用户上限 20 篇</p>
        <input type="file" id="file-input" accept=".pdf" style="display:none" />
      </div>
      <div id="upload-progress" style="padding:0 24px 8px;font-size:12px;display:none">
        <div id="progress-label" style="color:var(--ink-500);margin-bottom:4px;">准备中…</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
      </div>
      <div class="paper-list">
        <h3>我的论文</h3>
        <div id="papers-container"></div>
      </div>
    </div>

    <!-- 右侧：RAG 问答 -->
    <div class="panel-right">
      <div class="quota-banner" id="quota-banner">
        <span>套餐：<span class="plan" id="plan-label">Free</span></span>
        <span class="papers" id="papers-label">已上传 0 / 20 篇</span>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="msg assistant">
          <div class="bubble">
            👋 欢迎！上传你的第一篇论文，然后在这里问我任何问题。<br/><br/>
            例如：「这篇论文的核心结论是什么？」「作者用了什么方法？」
          </div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="chat-mode-row" id="chat-mode-row">
          <button class="mode-btn active" data-mode="default" onclick="setChatMode('default')">💬 默认问答</button>
          <button class="mode-btn" data-mode="methodology" onclick="setChatMode('methodology')">🔬 方法论审计</button>
          <button class="mode-btn" data-mode="survey" onclick="setChatMode('survey')">📝 文献综述</button>
        </div>
        <div class="chat-input-row">
          <textarea id="chat-input" rows="1" placeholder="问我关于你论文库的任何问题…" ></textarea>
          <button class="btn-send" id="btn-send" title="发送">
            <span class="btn-icon">↑</span>
            <span class="spinner"></span>
          </button>
        </div>
        <div id="chat-error" class="error-msg hidden"></div>
      </div>
    </div>
  </main>
</div>

<script>
  /* ── 全局状态 ──────────────────────────────────────────── */
  let token = localStorage.getItem('token') || '';
  let userEmail = localStorage.getItem('email') || '';
  let userId = localStorage.getItem('userId') || '';
  let collectionName = localStorage.getItem('collection') || '';
  let plan = localStorage.getItem('plan') || 'free';
  let uploading = false;
  let sending = false;
  let chatMode = 'default';

  const API = 'http://124.156.204.163:8080';

  /* ── Toast 通知系统 ─────────────────────────────────── */
  function showToast(msg, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
    toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      setTimeout(() => toast.remove(), 320);
    }, duration);
  }

  /* ── API 基础 ──────────────────────────────────────────── */
  async function api(method, path, body, noAuth, timeoutMs) {
    // 参数类型校验：noAuth 必须是 boolean，timeoutMs 必须是数字
    if (noAuth !== undefined && typeof noAuth !== 'boolean') {
      console.error('[api] 误用: 第4参数 noAuth 应为 false/true，实际为', typeof noAuth, '— 已修正');
    }
    if (timeoutMs !== undefined && typeof timeoutMs !== 'number') {
      console.error('[api] 误用: 第5参数 timeoutMs 应为数字，实际为', typeof timeoutMs);
    }
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), (typeof timeoutMs === 'number' ? timeoutMs : 30000));

    const headers = { 'Content-Type': 'application/json' };
    if (!noAuth) headers['Authorization'] = `Bearer ${token}`;
    const opts = { method, headers, signal: controller.signal };
    if (body) opts.body = JSON.stringify(body);

    let r;
    try {
      r = await fetch(API + path, opts);
    } catch (e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') {
        throw new Error(`请求超时（${((timeoutMs||30000)/1000).toFixed(0)}秒）— AI 生成需要较长时间，请稍后重试`);
      }
      throw new Error(`网络错误: ${e.message}`);
    }
    clearTimeout(timer);

    let rawText;
    try {
      rawText = await r.text();
    } catch {
      throw new Error(`HTTP ${r.status} — 响应读取失败`);
    }

    let data;
    try {
      data = JSON.parse(rawText);
    } catch {
      if (!rawText.trim()) {
        throw new Error(`请求超时（网络代理限制约60秒）— AI 生成需要 1-2 分钟，请减少问题复杂度`);
      }
      throw new Error(`HTTP ${r.status} — 服务器响应格式错误`);
    }

    if (!r.ok) {
      const msg = Array.isArray(data.detail)
        ? data.detail.map(e => e.msg || JSON.stringify(e)).join(', ')
        : (data.detail || `HTTP ${r.status}`);
      console.error('[API Error]', method, path, msg);
      throw new Error(msg);
    }
    return data;
  }

  /* ── Auth ──────────────────────────────────────────────── */
  function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-email').textContent = userEmail;
    loadPapers();
    loadQuota();
  }

  function logout() {
    token = ''; userEmail = ''; userId = ''; collectionName = '';
    localStorage.clear();
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    document.getElementById('chat-messages').innerHTML = `
      <div class="msg assistant">
        <div class="bubble">
          👋 欢迎！上传你的第一篇论文，然后在这里问我任何问题。<br/><br/>
          例如：「这篇论文的核心结论是什么？」「作者用了什么方法？」
        </div>
      </div>`;
  }

  document.getElementById('btn-login').onclick = async () => {
    const email = document.getElementById('email-input').value.trim();
    const pw = document.getElementById('password-input').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('btn-login');
    errEl.classList.add('hidden');
    if (!email || !pw) { errEl.textContent = '请填写邮箱和密码'; errEl.classList.remove('hidden'); return; }
    btn.disabled = true;
    btn.textContent = '登录中…';
    try {
      const data = await api('POST', '/auth/login', { email, password: pw }, true);
      token = data.access_token;
      const meResp = await api('GET', '/me/quota');
      userEmail = email;
      plan = meResp.plan || 'free';
      collectionName = meResp.collection || '';
      localStorage.setItem('token', token);
      localStorage.setItem('email', email);
      localStorage.setItem('plan', plan);
      localStorage.setItem('collection', collectionName);
      showApp();
      showToast('登录成功', 'success');
    } catch(e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = '登录';
    }
  };

  document.getElementById('btn-show-register').onclick = async () => {
    const email = document.getElementById('email-input').value.trim();
    const pw = document.getElementById('password-input').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('btn-login');
    errEl.classList.add('hidden');
    if (!email || !pw) { errEl.textContent = '请填写邮箱和密码'; errEl.classList.remove('hidden'); return; }
    btn.disabled = true; btn.textContent = '注册中…';
    try {
      await api('POST', '/auth/register', { email, password: pw }, true);
      btn.disabled = false; btn.textContent = '登录';
      errEl.textContent = '注册成功，请登录';
      errEl.style.color = 'var(--success)';
      errEl.classList.remove('hidden');
      document.getElementById('password-input').value = '';
    } catch(e) {
      errEl.textContent = e.message.includes('已注册') ? '该邮箱已注册，请直接登录' : e.message;
      errEl.style.color = '';
      errEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = '登录';
    }
  };

  // 回车登录
  document.getElementById('password-input').onkeydown = e => { if (e.key === 'Enter') document.getElementById('btn-login').click(); };

  /* ── 上传 ─────────────────────────────────────────────── */
  const uploadZone = document.getElementById('upload-zone');
  const fileInput  = document.getElementById('file-input');

  uploadZone.addEventListener('click', () => { if (!uploading) fileInput.click(); });
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    if (uploading) return;
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  async function handleFile(file) {
    if (!file.name.endsWith('.pdf')) { showToast('只支持 PDF 文件', 'error'); return; }
    if (file.size > 50 * 1024 * 1024) { showToast('文件超过 50MB 限制', 'error'); return; }
    uploading = true;
    const zone = document.getElementById('upload-zone');
    const spinner = document.getElementById('upload-spinner');
    const zoneText = document.getElementById('upload-zone-text');
    spinner.style.display = 'block';
    zone.classList.add('uploading');
    zoneText.textContent = '正在上传…';

    const progressDiv = document.getElementById('upload-progress');
    const fill = document.getElementById('progress-fill');
    const label = document.getElementById('progress-label');
    progressDiv.style.display = 'block';
    fill.style.width = '0%';
    label.textContent = '上传中…';

    let sseEnded = false;
    let uploadDone = false;


    try {
      // 用 fetch + SSE 进度
      const xhr = new XMLHttpRequest();
      const formData = new FormData();
      formData.append('file', file);

      const uploadPromise = new Promise((resolve, reject) => {
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 40);
            fill.style.width = pct + '%';
            label.textContent = `上传中 ${pct}%`;
          }
        };
        xhr.onload = () => {
          if (xhr.status === 200 || xhr.status === 201) {
            uploadDone = true;
            fill.style.width = '40%'; // upload done, switch to SSE tracking
            label.textContent = '上传完成，已开始索引…';
            try {
              const resp = JSON.parse(xhr.responseText);
              resolve(resp.paper_id);
            } catch { resolve(null); }
          } else {
            try { const d = JSON.parse(xhr.responseText); reject(new Error(d.detail || `上传失败 HTTP ${xhr.status}`)); }
            catch { reject(new Error(`上传失败 HTTP ${xhr.status}`)); }
          }
        };
        xhr.onerror = () => reject(new Error('网络错误'));
        xhr.open('POST', API + '/papers/upload');
        xhr.setRequestHeader('Authorization', `Bearer ${token}`);
        xhr.send(formData);
      });

      const paperId = await uploadPromise;

      // ── 轮询索进进度（40% → 100%，最多 5 分钟）─────────
      if (paperId) {
        let polls = 0;
        const maxPolls = 60; // 最多 60 次（5 分钟）
        const stageLabels = {
          // 细粒度阶段（后端 processing_events 发出的 stage）
          parsing_pages:    '🔍 正在识别页面结构…',
          parsing_text:     '📄 正在提取文本内容…',
          parsing_tables:   '📊 正在解析表格…',
          parsing_done:     '✅ 版面解析完成',
          chunking:         '✂️ 正在切分文档…',
          chunking_done:    '✅ 语义分块完成',
          embedding:        '🧠 正在生成向量…',
          embedding_done:   '✅ 向量生成完成',
          indexing:         '💾 正在写入索引…',
          complete:         '🎉 索引完成',
          // 兜底
          parsing:          '正在解析 PDF…',
          embedding:        '正在生成向量…',
          processing:       '正在处理中…',
        };
        function pollProgress() {
          polls++;
          api('GET', `/papers/${paperId}/status`).then(data => {
            const status = data.status;
            if (status === 'ready') {
              fill.style.width = '100%';
              label.textContent = '索引完成';
              progressDiv.style.display = 'none';
              showToast('论文索引完成', 'success');
              loadPapers();
              loadQuota();
            } else if (status === 'error' || status === 'failed') {
              progressDiv.style.display = 'none';
              showToast('索引失败：' + (data.error || '未知错误'), 'error');
              loadPapers();
            } else {
              // "processing" — 优先用后端细粒度 stage_label，否则用 stageLabels 兜底
              const pct = data.progress != null
                ? Math.round(data.progress * 100)
                : Math.round(40 + (polls / maxPolls) * 58);
              fill.style.width = pct + '%';
              label.textContent = data.stage_label || stageLabels[data.stage] || stageLabels[status] || `正在处理中… ${pct}%`;
              if (polls < maxPolls) {
                setTimeout(pollProgress, 5000);
              } else {
                progressDiv.style.display = 'none';
                showToast('索引超时，请在论文列表查看状态', 'warning');
                loadPapers();
              }
            }
          }).catch(() => {
            // 网络错误，继续轮询
            if (polls < maxPolls) setTimeout(pollProgress, 5000);
          });
        }
        label.textContent = '正在解析 PDF…';
        setTimeout(pollProgress, 2000);
      } else {
        progressDiv.style.display = 'none';
        showToast('上传成功', 'success');
        loadPapers();
        loadQuota();
      }

    } catch(e) {
      console.error('[Upload Error]', e);
      showToast('上传失败：' + e.message, 'error');
      progressDiv.style.display = 'none';
    } finally {
      uploading = false;
      spinner.style.display = 'none';
      zone.classList.remove('uploading');
      zoneText.textContent = '📄 拖拽 PDF 到这里，或点击选择文件';
      // progressDiv hidden by polling oncomplete/onerror
    }
  }

  /* ── 论文列表 ─────────────────────────────────────────── */
  async function loadPapers() {
    try {
      const papers = await api('GET', '/papers');
      const container = document.getElementById('papers-container');
      if (!papers || papers.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📚</div>
            <div class="empty-title">还没有上传论文</div>
            <div class="empty-desc">拖拽 PDF 到上方，或点击上传区域<br/>开始构建你的学术知识库</div>
          </div>`;
        return;
      }
      container.innerHTML = papers.filter(p => p.status === 'ready').map(p => `
        <div class="paper-item" data-paper-id="${escapeHtml(p.paper_id)}">
          <div class="paper-body">
            <div class="title">${escapeHtml(p.title)}</div>
            <div class="meta">${p.chunks_count ? p.chunks_count + ' 个片段' : '处理中…'}</div>
            <span class="status ${p.status}" id="status-${p.paper_id}">${
              p.status === 'ready' ? '✅ 已索引'
              : p.status === 'processing' ? '⏳ 索引中'
              : '❌ 失败'
            }</span>
          </div>
          <div class="paper-actions">
            <button class="action-btn cite-btn" data-action="cite" data-id="${escapeHtml(p.paper_id)}" data-title="${escapeHtml(p.title)}">📎 引用</button>
            <button class="action-btn delete-btn" data-action="delete" data-id="${escapeHtml(p.paper_id)}" data-title="${escapeHtml(p.title)}">🗑️</button>
          </div>
        </div>`).join('');

      // 事件委托：论文卡片按钮
      container.querySelectorAll('.paper-actions button').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const action = btn.dataset.action;
          const paperId = btn.dataset.id;
          const title = btn.dataset.title;
          if (action === 'cite') {
            insertPaperCitation(paperId, title);
          } else if (action === 'delete') {
            confirmDelete(paperId, title);
          }
        });
      });
    } catch(e) {
      console.error('[LoadPapers Error]', e);
    }
  }

  async function confirmDelete(paperId, title) {
    if (!confirm(`确定删除论文 "${title}" 吗？\n\n删除后该论文的所有片段将从知识库中移除，且无法恢复。`)) return;
    try {
      await api('DELETE', `/papers/${paperId}`);
      showToast('论文已删除', 'success');
      loadPapers();
      loadQuota();
    } catch(e) {
      showToast('删除失败：' + e.message, 'error');
    }
  }

  /* ── 论文引用 ─────────────────────────────────────── */
  function insertPaperCitation(paperId, title) {
    const input = document.getElementById('chat-input');
    const sep = input.value.trim() ? ' ' : '';
    // 追加格式：引用论文：{标题}
    input.value += sep + `引用论文：${title}`;
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
    input.focus();
    showToast(`已引用：${title}`, 'success');
  }

  /* ── 配额 ─────────────────────────────────────────── */
  async function loadQuota() {
    try {
      const me = await api('GET', '/me/quota');
      plan = me.plan || 'free';
      const used = me.papers_used || 0;
      const limit = me.papers_limit;
      document.getElementById('plan-label').textContent = plan === 'pro' ? 'Pro' : 'Free';
      const limitTxt = limit ? `已上传 ${used} / ${limit} 篇` : `已上传 ${used} 篇`;
      document.getElementById('papers-label').textContent = limitTxt;
    } catch(e) { console.error('[LoadQuota Error]', e); }
  }

  /* ── 聊天模式 ─────────────────────────────────────────── */
  function setChatMode(mode) {
    chatMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
  }

  /* ── 发送消息 ─────────────────────────────────────────── */
  document.getElementById('btn-send').onclick = sendMessage;
  document.getElementById('chat-input').onkeydown = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('btn-send');
    const errEl = document.getElementById('chat-error');
    errEl.classList.add('hidden');

    // 显示用户消息
    const msgs = document.getElementById('chat-messages');
    const userMsgEl = document.createElement('div');
    userMsgEl.className = 'msg user';
    userMsgEl.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    msgs.appendChild(userMsgEl);
    input.value = '';
    input.style.height = 'auto';

        // 答案气泡（流式渲染，只显示 Markdown 回答）
    const assistantEl = document.createElement('div');
    assistantEl.className = 'msg assistant';
    const modeLabel = chatMode === 'methodology' ? '🔬 方法论审计' : chatMode === 'survey' ? '📝 文献综述' : '';
    const modeBadge = modeLabel ? `<span class="mode-badge ${chatMode}">${modeLabel}</span>` : '';
    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'bubble';
    // 等待提示：打字动画 + 状态文字
    const waitEl = document.createElement('div');
    waitEl.className = 'wait-indicator';
    waitEl.innerHTML = '<span class="wait-dots"><span></span><span></span><span></span></span><span class="wait-text">正在检索论文并生成答案…</span>';
    bubbleEl.appendChild(waitEl);
    assistantEl.innerHTML = modeBadge;
    assistantEl.appendChild(bubbleEl);
    msgs.appendChild(assistantEl);
    msgs.scrollTop = msgs.scrollHeight;

    sending = true;
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const resp = await fetch(API + '/chat/stream', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          question: text,
          collection_name: collectionName,
          top_k: 3,
          mode: chatMode,
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: `HTTP ${resp.status}` }));
        throw new Error(Array.isArray(err.detail) ? err.detail.map(e => e.msg).join(', ') : (err.detail || `HTTP ${resp.status}`));
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();

      // 流式 SSE：过滤思考块，只渲染 Markdown
      let done = false;
      let lineBuf = '';
      let tokBuf = '';

      // 提取思考块（不删除），返回 { thinking, answer }
      const extractThinking = (text) => {
        const thinkingBlocks = [];
        const clean = text
          .replace(/<think[ing]*>([\s\S]*?)<\/think>/gi, (_, inner) => {
            const trimmed = inner.trim();
            if (trimmed) thinkingBlocks.push(trimmed);
            return '';
          })
          .replace(/<THINK[\s\S]*?<\/THINK>/gi, '');
        return { thinking: thinkingBlocks, answer: clean };
      };

      // 去掉 LLM 错误生成的页码引用（如 "📄 p.12"），不是有效 citation
      const stripPageRefs = (text) => {
        return text.replace(/📄\s*p\.?\s*\d+/gi, '').replace(/p\.\s*\d+/g, '').trim();
      };

      // 渲染 bubble 内所有 KaTeX 数学公式（块级 + 行内）
      const renderMathAll = (bubble) => {
        if (typeof renderMathInElement !== 'function') return;
        try {
          renderMathInElement(bubble, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
            ],
            throwOnError: false,
            errorColor: '#dc2626',
          });
        } catch(e) {
          // KaTeX 渲染失败不影响页面显示
        }
      };

      // 将一行文本渲染为单行 markdown HTML（不加 outer <p>）
      const renderMarkdownLine = (line) => {
        if (!line.trim()) return '';
        // 块级公式 $$...$$ 整行替换
        if (/^\$\$.+\$\$$/s.test(line)) {
          const formula = line.replace(/^\$\$|\$\$$/g, '');
          const id = 'katex-block-' + Math.random().toString(36).slice(2, 8);
          return `<div class="katex-display" id="${id}" data-formula="${encodeURIComponent(formula)}"></div>`;
        }
        // 先做 markdown 替换，再做 HTML 转义（避免 & 吃掉 ** 两边的字符）
        const md = line
          .replace(/^&gt; (.+)$/, '<blockquote>$1</blockquote>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
          .replace(/(?<!_)_(?!_)(.+?)(?<!_)_(?!_)/g, '<em>$1</em>')
          .replace(/~~(.+?)~~/g, '<del>$1</del>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/^### (.+)$/, '<h3>$1</h3>')
          .replace(/^## (.+)$/, '<h2>$1</h2>')
          .replace(/^# (.+)$/, '<h1>$1</h1>')
          .replace(/([^`$])\$(.+?)\$([^$])/g, '$1<span class="katex-inline" data-formula="$2"></span>$3');
        // HTML 转义最后做
        return md
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      };

      // 解析 markdown 表格（lines 是连续的表格行）
      const parseTable = (lines) => {
        if (lines.length < 2) return null;
        // separator 行必须是 |---|... 格式
        if (!/^\|?[\s:\-|]+\|/.test(lines[1])) return null;
        const headers = lines[0].split('|').map(h => h.trim()).filter(h => h && !/^-+$/.test(h));
        if (headers.length === 0) return null;
        const rows = [];
        for (let i = 2; i < lines.length; i++) {
          const cells = lines[i].split('|').map(c => c.trim()).filter(c => c);
          if (cells.length > 0) rows.push(cells);
        }
        // 对单元格内容做 markdown 转义（加粗、斜体等）
        const cellMd = (s) => s
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>');
        let html = '<table class="md-table"><thead><tr>';
        html += headers.map(h => `<th>${cellMd(h)}</th>`).join('') + '</tr></thead><tbody>';
        rows.forEach(row => {
          html += '<tr>' + row.map(c => `<td>${cellMd(c)}</td>`).join('') + '</tr>';
        });
        html += '</tbody></table>';
        return html;
      };

      // 将 markdown 转换为 HTML
      const renderMarkdown = (text) => {
        if (!text || !text.trim()) return;
        text = stripPageRefs(text);
        if (!text.trim()) return;

        const lines = text.split('\n');
        const inBlock = [];
        const output = [];

        const flushBlock = () => {
          if (inBlock.length === 0) return;

          // ── 辅助：单元格内容转 HTML（加粗/斜体/代码/公式）
          const cellMd = (s) => s
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/__(.+?)__/g, '<strong>$1</strong>')
            .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
            .replace(/~~(.+?)~~/g, '<del>$1</del>')
            .replace(/`([^`]+)`/g, '<code>$1</code>');

          // ── 表格检测 A：有分隔行（标准 |---| 格式）
          const isSeparator = (line) => /^\|?[\s:\-\|]+\|/.test(line);
          // ── 表格检测 B：无分隔行，全是 pipe 分隔且列数一致
          const pipeCount = (line) => (line.match(/\|/g) || []).length;
          const isTableBlock = (lines) => {
            if (lines.length < 2) return false;
            if (isSeparator(lines[1])) return true;
            const counts = lines.map(pipeCount);
            return counts[0] >= 2 && counts.every(c => c === counts[0]);
          };

          if (isTableBlock(inBlock)) {
            const hasSep = inBlock.length >= 2 && isSeparator(inBlock[1]);
            const dataStart = hasSep ? 2 : 0;
            const headers = inBlock[0].split('|').map(h => h.trim()).filter(h => h && !/^\-+$/.test(h));
            if (headers.length > 0) {
              const rows = [];
              for (let i = dataStart; i < inBlock.length; i++) {
                const cells = inBlock[i].split('|').map(c => c.trim()).filter(c => c && !/^\-+$/.test(c));
                if (cells.length > 0) rows.push(cells);
              }
              let html = '<table class="md-table"><thead><tr>';
              html += headers.map(h => `<th>${cellMd(h)}</th>`).join('') + '</tr></thead><tbody>';
              rows.forEach(row => {
                html += '<tr>' + row.map(c => `<td>${cellMd(c)}</td>`).join('') + '</tr>';
              });
              html += '</tbody></table>';
              output.push(html);
              inBlock.length = 0;
              return;
            }
          }
// 普通段落：先合并连续 blockquote 行，再逐行转 HTML
          const blockquoteLines = [];
          const normalLines = [];
          for (const l of inBlock) {
            if (/^&gt;\s/.test(l)) {
              blockquoteLines.push(l);
            } else {
              if (blockquoteLines.length > 0) {
                // 合并所有连续 blockquote 行为一个 blockquote
                const merged = blockquoteLines.map(l => l.replace(/^&gt;\s?/, '')).join('\n');
                const safe = merged.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                output.push(`<blockquote>${safe}</blockquote>`);
                blockquoteLines.length = 0;
              }
              normalLines.push(l);
            }
          }
          if (blockquoteLines.length > 0) {
            const merged = blockquoteLines.map(l => l.replace(/^&gt;\s?/, '')).join('\n');
            const safe = merged.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            output.push(`<blockquote>${safe}</blockquote>`);
          }
          if (normalLines.length > 0) {
            output.push(normalLines.map(l => {
              if (!l.trim()) return '';
              // 块级公式 $$...$$ 单独处理
              if (/^\$\$.+\$\$$/s.test(l)) {
                const formula = l.replace(/^\$\$|\$\$$/g, '');
                const id = 'katex-block-' + Math.random().toString(36).slice(2, 8);
                return `<div class="katex-display" id="${id}" data-formula="${encodeURIComponent(formula)}"></div>`;
              }
              const md = l
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.+?)__/g, '<strong>$1</strong>')
                .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                .replace(/~~(.+?)~~/g, '<del>$1</del>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^### (.+)$/, '<h3>$1</h3>')
                .replace(/^## (.+)$/, '<h2>$1</h2>')
                .replace(/^# (.+)$/, '<h1>$1</h1>')
                .replace(/([^`$])\$(.+?)\$([^$])/g, '$1<span class="katex-inline" data-formula="$2"></span>$3');
              return md
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            }).join('<br>'));
          }
          inBlock.length = 0;
        };

        for (const line of lines) {
          if (!line.trim()) { flushBlock(); continue; }
          inBlock.push(line);
        }
        flushBlock();
        const html = output.filter(Boolean).join('');
        if (html) { bubbleEl.innerHTML += html; msgs.scrollTop = msgs.scrollHeight; }
        renderMathAll(bubbleEl);
      };

      // 将思考内容渲染为可折叠块（默认收起）
      const renderThinkingBlocks = (blocks) => {
        if (!blocks || blocks.length === 0) return;
        const details = document.createElement('details');
        details.className = 'thinking-block';
        const summary = document.createElement('summary');
        const count = blocks.length;
        summary.innerHTML = `<span>💭</span><span style="font-weight:700">思考过程</span><span style="font-size:11px;opacity:0.75">（点击展开 / 收起）</span><span class="toggle-icon">▼</span>`;
        details.appendChild(summary);
        blocks.forEach((blk, i) => {
          // 思考内容也支持 markdown 格式（加粗、斜体、代码、公式）
          const p = document.createElement('div');
          p.className = 'thinking-content';
          // 用 renderMarkdownLine 处理每一行
          const lines = blk.split('\n');
          p.innerHTML = lines.map(l => {
            if (!l.trim()) return '';
            if (/^\$\$.+\$\$$/s.test(l)) {
              const formula = l.replace(/^\$\$|\$\$$/g, '');
              const id = 'katex-block-' + Math.random().toString(36).slice(2, 8);
              return `<div class="katex-display" id="${id}" data-formula="${encodeURIComponent(formula)}"></div>`;
            }
            const md = l
              .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
              .replace(/__(.+?)__/g, '<strong>$1</strong>')
              .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
              .replace(/~~(.+?)~~/g, '<del>$1</del>')
              .replace(/`([^`]+)`/g, '<code>$1</code>')
              .replace(/([^`$])\$(.+?)\$([^$])/g, '$1<span class="katex-inline" data-formula="$2"></span>$3');
            return md
              .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          }).join('<br>');
          if (i > 0) p.style.marginTop = '6px';
          details.appendChild(p);
        });
        // 思考块渲染完后触发 KaTeX
        renderMathAll(details);
        bubbleEl.appendChild(details);
        // 在思考块和回答之间加分隔
        const sep = document.createElement('div');
        sep.className = 'answer-divider';
        sep.innerHTML = '<span>💡 正式回答</span>';
        bubbleEl.appendChild(sep);
      };

      const flushLine = () => {
        const line = lineBuf.trim();
        lineBuf = '';
        if (!line.startsWith('data: ')) return;
        const dataStr = line.slice(6);
        try {
          const data = JSON.parse(dataStr);
          if (data.type === 'token') {
            // 第一个 token 到达时移除等待提示
            if (tokBuf === '') {
              waitEl.remove();
            }
            tokBuf += data.content;
          } else if (data.type === 'done') {
            const { thinking, answer } = extractThinking(tokBuf);
            renderThinkingBlocks(thinking);
            if (answer.trim()) {
              const esc = answer.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
              renderMarkdown(esc);
              renderMathAll(bubbleEl);
            } else {
              renderMathAll(bubbleEl);
            }
            // 渲染引用来源（论文标题+页码）
            if (data.citations && data.citations.length > 0) {
              const citeEl = document.createElement('div');
              citeEl.className = 'citations';
              citeEl.innerHTML = '<div class="cite-label">参考文献：</div>' +
                data.citations.map(c => {
                  const title = c.title || '未知论文';
                  const page = c.page ? ` 第${c.page}页` : '';
                  return `<span class="cite">${title}${page}</span>`;
                }).join('');
              assistantEl.appendChild(citeEl);
            }
            // 质量警告
            if (data.quality_warning) {
              const warnEl = document.createElement('div');
              warnEl.className = 'quality-warn';
              warnEl.textContent = data.quality_warning;
              assistantEl.appendChild(warnEl);
            }
            done = true;
          } else if (data.type === 'error') {
            throw new Error(data.message || '流式生成失败');
          }
        } catch {}
      };

      while (!done) {
        const { value, done: streamDone } = await reader.read();
        done = streamDone;
        if (value) {
          const text = decoder.decode(value, { stream: !done });
          for (const ch of text) {
            if (ch === '\n') {
              if (lineBuf.trim()) flushLine();
              lineBuf = '';
            } else if (ch !== '\r') {
              lineBuf += ch;
            }
          }
        }
      }
    } catch(e) {
      msgs.removeChild(assistantEl);
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
      showToast('发送失败：' + e.message, 'error');
    } finally {
      sending = false;
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  /* ── 工具函数 ─────────────────────────────────────────── */
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 启动检查 ─────────────────────────────────────────── */
  if (token) {
    api('GET', '/me/quota').then(me => {
      userEmail = localStorage.getItem('email') || '';
      plan = me.plan || 'free';
      collectionName = me.collection || '';
      showApp();
    }).catch(() => {
      logout();
    });
  }
</script>
<script>
// ── 全局未捕获 Promise 错误（防止静默失败）─────────────
window.addEventListener('unhandledrejection', e => {
  console.error('[UnhandledPromiseRejection]', e.reason);
  if (e.reason instanceof Error && !window._toastActive) {
    window._toastActive = true;
    const el = document.createElement('div');
    el.style = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#fee2e2;color:#991b1b;padding:8px 16px;border-radius:8px;z-index:9999;font-size:13px;max-width:90vw;word-break:break-all;';
    el.textContent = '系统错误：' + (e.reason.message || String(e.reason)).substring(0, 100);
    document.body.appendChild(el);
    setTimeout(() => { el.remove(); window._toastActive = false; }, 8000);
  }
});
</script>
</body>
</html>
